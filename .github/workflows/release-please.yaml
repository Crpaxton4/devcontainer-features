name: "Release Please"

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-devcontainer:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/release.yaml
    permissions:
      contents: write
      pull-requests: write
      packages: write
    secrets: inherit

  # NOTE: Mutation testing is intentionally NOT run here. It is a slow (hours)
  # job and is instead a *manually-triggered, required* gate on the
  # release-please PR (see .github/workflows/mutation.yaml). Firing it
  # automatically after a release was cut gated nothing, so it was removed.
