name: "Release Please"

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-devcontainer:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/release.yaml
    permissions:
      contents: write
      pull-requests: write
      packages: write
    secrets: inherit

  # Mutation testing is slow (hours) so it never runs on push/PR. Run it on the
  # release commit whenever a release is cut, so mutation coverage tracks each
  # released version instead of being neglected between manual dispatches.
  mutation:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/mutation.yaml
    permissions:
      contents: read
