name: "Release Please"

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      personal_features_release_created: ${{ steps.release.outputs['features/personal-features--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Merging the release PR that release-please opens cuts a GitHub Release,
  # which should immediately publish the new Feature version to GHCR instead
  # of waiting for someone to remember to run the manual workflow_dispatch.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.personal_features_release_created == 'true' }}
    uses: ./.github/workflows/release.yaml
    permissions:
      contents: write
      pull-requests: write
      packages: write
    secrets: inherit
