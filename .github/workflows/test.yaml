name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Single source of truth for the pinned @devcontainers/cli version. Referenced by
# every install step and by the npm cache key below. Dependabot (npm) does not
# bump inline workflow strings, so refresh this manually (also update the pin in
# .devcontainer/devcontainer.json updateContentCommand to match).
env:
  DEVCONTAINERS_CLI_VERSION: "0.87.0"

jobs:
  # Gate the hand-authored devcontainer-feature.json against persisted-paths.tsv,
  # the single source of truth for persisted bind-mount paths. The JSON can't be
  # generated (release-please patches $.version into it in place), so it's checked
  # instead. A dedicated stdlib-only job rather than a step inside the heavy
  # feature-test jobs: it needs no Docker/uv/CLI, runs in seconds, and - unlike
  # scripts-tests.yaml - test.yaml has no paths filter, so this gates every PR
  # (e.g. one that edits only install.sh) and every push to main.
  check-persisted-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: "Check devcontainer-feature.json matches persisted-paths.tsv"
        run: python .github/scripts/check_persisted_paths.py

  test-autogenerated:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - personal-features
        baseImage:
          # 'personal-features' needs npm at install time (it has no Node of
          # its own by design - see src/personal-features/NOTES.md), so the
          # autogenerated, feature-alone test needs a base image that already
          # has Node.
          - mcr.microsoft.com/devcontainers/javascript-node:latest
          - node:lts-bookworm
    steps:
      - uses: actions/checkout@v7

      - name: Cache npm global store
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-devcontainers-cli-${{ env.DEVCONTAINERS_CLI_VERSION }}

      - name: "Install pinned devcontainer CLI"
        run: npm install -g @devcontainers/cli@${{ env.DEVCONTAINERS_CLI_VERSION }}

      - name: "Set up uv"
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: "Bundle Python libraries into feature"
        run: |
          uv build --directory libraries/odoo_sdk
          cp libraries/odoo_sdk/dist/*.whl devcontainer-features/src/personal-features/

      # Run the same script consumers run, rather than a hardcoded copy of the
      # mount list: the list is then defined in exactly one place, and a mount
      # source setup.sh forgets to create fails the container build here (#198).
      - name: "Create bind mount source paths on runner"
        run: sh ./setup.sh

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test -p ./devcontainer-features --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - personal-features
        scenario:
          - with_node_and_gh
          - on_odoo_base_image
          - on_odoo18_base_image
          - on_odoo17_base_image
          - on_odoo16_base_image
    steps:
      - uses: actions/checkout@v7

      - name: Cache npm global store
        uses: actions/cache@v6
        with:
          path: ~/.npm
          key: npm-devcontainers-cli-${{ env.DEVCONTAINERS_CLI_VERSION }}

      - name: "Install pinned devcontainer CLI"
        run: npm install -g @devcontainers/cli@${{ env.DEVCONTAINERS_CLI_VERSION }}

      - name: "Set up uv"
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: "Bundle Python libraries into feature"
        run: |
          uv build --directory libraries/odoo_sdk
          cp libraries/odoo_sdk/dist/*.whl devcontainer-features/src/personal-features/

      # Run the same script consumers run, rather than a hardcoded copy of the
      # mount list: the list is then defined in exactly one place, and a mount
      # source setup.sh forgets to create fails the container build here (#198).
      - name: "Create bind mount source paths on runner"
        run: sh ./setup.sh

      - name: "Generating tests for '${{ matrix.features }}' scenario '${{ matrix.scenario }}'"
        run: devcontainer features test -p ./devcontainer-features -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated --filter ${{ matrix.scenario }} .
