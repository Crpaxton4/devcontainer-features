name: "CI - Test Features"
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-autogenerated:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - personal-features
        baseImage:
          # 'personal-features' needs npm at install time (it has no Node of
          # its own by design - see src/personal-features/NOTES.md), so the
          # autogenerated, feature-alone test needs a base image that already
          # has Node.
          - mcr.microsoft.com/devcontainers/javascript-node:latest
          - node:lts-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm global store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-devcontainers-cli

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Create bind mount source paths on runner"
        run: mkdir -p ~/.claude ~/.config/gh && touch ~/.bash_history ~/.zsh_history

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: devcontainer features test -p ./devcontainer-features --skip-scenarios -f ${{ matrix.features }} -i ${{ matrix.baseImage }} .

  test-scenarios:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        features:
          - personal-features
    steps:
      - uses: actions/checkout@v4

      - name: Cache npm global store
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-devcontainers-cli

      - name: "Install latest devcontainer CLI"
        run: npm install -g @devcontainers/cli

      - name: "Set up uv"
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: "Bundle Python libraries into feature"
        run: |
          uv build --directory libraries/odoo_sdk
          cp libraries/odoo_sdk/dist/*.whl devcontainer-features/src/personal-features/

      - name: "Create bind mount source paths on runner"
        run: mkdir -p ~/.claude ~/.config/gh ~/.config/odoo_sdk && touch ~/.bash_history ~/.zsh_history

      - name: "Generating tests for '${{ matrix.features }}' scenarios"
        run: devcontainer features test -p ./devcontainer-features -f ${{ matrix.features }} --skip-autogenerated --skip-duplicated .
