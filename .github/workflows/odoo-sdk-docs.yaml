name: "CI - odoo_sdk docs"

on:
  push:
    branches:
      - main
    paths:
      - 'libraries/odoo_sdk/src/**'
      - 'libraries/odoo_sdk/docs/**'
      - 'libraries/odoo_sdk/pyproject.toml'
      - 'libraries/odoo_sdk/Makefile'
      - '.github/workflows/odoo-sdk-docs.yaml'
  pull_request:
    paths:
      - 'libraries/odoo_sdk/src/**'
      - 'libraries/odoo_sdk/docs/**'
      - 'libraries/odoo_sdk/pyproject.toml'
      - 'libraries/odoo_sdk/Makefile'
      - '.github/workflows/odoo-sdk-docs.yaml'
  workflow_dispatch:

# Read-only by default; the deploy job widens this for GitHub Pages.
permissions:
  contents: read

defaults:
  run:
    working-directory: libraries/odoo_sdk

jobs:
  build:
    name: "Build docs (warnings-as-errors)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      # nbsphinx converts docs/source/walkthrough.ipynb via pandoc, which is a
      # system binary (not a pip/uv dependency) and is not guaranteed on the
      # runner image, so install it explicitly.
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pandoc

      - name: Install docs dependencies
        run: uv sync --group docs

      # SPHINX_CMD_OPTS=-W turns Sphinx warnings into errors so new problems in
      # the hand-written pages fail CI. Pre-existing, structural warnings from
      # the re-export API surface and mermaid design diagrams are scoped out in
      # docs/source/conf.py (see suppress_warnings / logging filter there).
      - name: Build HTML docs
        run: make html SPHINX_CMD_OPTS=-W

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: libraries/odoo_sdk/docs/build

  deploy:
    name: "Deploy to GitHub Pages"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    # Serialize deployments without serializing PR docs builds.
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
