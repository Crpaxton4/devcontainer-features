name: "CI - odoo_sdk quality"

on:
  push:
    branches:
      - main
    paths:
      - 'libraries/odoo_sdk/src/**'
      - 'libraries/odoo_sdk/tests/**'
      - 'libraries/odoo_sdk/pyproject.toml'
      - 'libraries/odoo_sdk/tools/**'
      - 'libraries/odoo_sdk/cosmic-ray*.toml'
      - '.github/workflows/odoo-sdk-quality.yaml'
  pull_request:
    paths:
      - 'libraries/odoo_sdk/src/**'
      - 'libraries/odoo_sdk/tests/**'
      - 'libraries/odoo_sdk/pyproject.toml'
      - 'libraries/odoo_sdk/tools/**'
      - 'libraries/odoo_sdk/cosmic-ray*.toml'
      - '.github/workflows/odoo-sdk-quality.yaml'
  workflow_dispatch:

defaults:
  run:
    working-directory: libraries/odoo_sdk

jobs:
  tests:
    name: "Tests & Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run tests and coverage
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: libraries/odoo_sdk/reports/coverage/

  static:
    name: "Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install static analysis dependencies
        run: uv sync --group static-analysis

      - name: Run static analysis
        run: make static

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-report
          path: libraries/odoo_sdk/reports/

  mutation:
    name: "Mutation Testing"
    runs-on: ubuntu-latest
    # Mutation tests are slow — run only when explicitly triggered.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run mutation tests (local distributor)
        run: |
          mkdir -p .cosmic-ray reports/mutation
          . .venv/bin/activate
          cosmic-ray init cosmic-ray-ci.toml .cosmic-ray/session.sqlite
          cosmic-ray baseline cosmic-ray-ci.toml
          cosmic-ray exec cosmic-ray-ci.toml .cosmic-ray/session.sqlite
          cr-report --surviving-only .cosmic-ray/session.sqlite | tee reports/mutation/surviving.txt
          cr-html .cosmic-ray/session.sqlite > reports/mutation/report.html

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: libraries/odoo_sdk/reports/mutation/
