name: "CI - odoo_sdk quality"

on:
  push:
    branches:
      - main
    paths:
      - 'libraries/odoo_sdk/src/**'
      - 'libraries/odoo_sdk/tests/**'
      - 'libraries/odoo_sdk/pyproject.toml'
      - 'libraries/odoo_sdk/tools/**'
      - 'libraries/odoo_sdk/cosmic-ray*.toml'
      - '.github/workflows/odoo-sdk-quality.yaml'
  pull_request:
    paths:
      - 'libraries/odoo_sdk/src/**'
      - 'libraries/odoo_sdk/tests/**'
      - 'libraries/odoo_sdk/pyproject.toml'
      - 'libraries/odoo_sdk/tools/**'
      - 'libraries/odoo_sdk/cosmic-ray*.toml'
      - '.github/workflows/odoo-sdk-quality.yaml'
  workflow_dispatch:

defaults:
  run:
    working-directory: libraries/odoo_sdk

jobs:
  tests:
    name: "Tests & Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run tests and coverage
        run: make coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: libraries/odoo_sdk/reports/coverage/

  static:
    name: "Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install static analysis dependencies
        run: uv sync --group static-analysis

      - name: Run static analysis
        run: make static

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-report
          path: libraries/odoo_sdk/reports/
