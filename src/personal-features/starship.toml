[profiles]
claude-code = "$claude_context$directory$git_branch$claude_cost"

[claude_context]
gauge_width = 5
format = "[$gauge $percentage]($style) "

[[claude_context.display]]
threshold = 0
style = "white"

[[claude_context.display]]
threshold = 80
style = "yellow"

[[claude_context.display]]
threshold = 90
style = "red"

[claude_cost]
format = "[+$lines_added/-$lines_removed]($style) "

[[claude_cost.display]]
threshold = 0.0
style = "white"

[git_branch]
symbol = "⎇ "
format = "⎇ [$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
conflicted = "!"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕↑${ahead_count}↓${behind_count}"
up_to_date = ""
untracked = "?"
stashed = "≡"
modified = "~"
staged = "+"
renamed = "»"
deleted = "✗"

[package]
disabled = true

[python]
symbol = "λ "
format = 'λ [$pyenv_prefix($version )(\($virtualenv\))]($style) '

[docker_context]
disabled = true

[cmd_duration]
min_time = 5_000
format = "⧗ [$duration](bold yellow) "

[status]
disabled = false
symbol = "✗"

[time]
disabled = false
time_format = "%H:%M"
utc_time_offset = "+0"
format = "[$time]($style) "

[env_var.ODOO_VERSION]
format = "[$env_value]($style) "

[container]
disabled = true
