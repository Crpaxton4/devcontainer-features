# Cosmic Ray config for CI — uses the local (single-process) distributor so
# no HTTP worker infrastructure is needed. Used by the mutation job in
# .github/workflows/odoo-sdk-quality.yaml; the http-worker config in
# cosmic-ray.toml is for local parallel runs.

[cosmic-ray]
module-path = "src"
timeout = 120.0
excluded-modules = [
	"**/examples/**",
]
test-command = 'python -m unittest discover -s test/odoo_sdk -p "test_*.py" -t .'

[cosmic-ray.distributor]
name = "local"
